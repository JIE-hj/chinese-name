<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>중국어 이름 찾기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  --color-primary: #4F46E5; /* 프리미엄 인디고 */
  --color-primary-light: #EEEDFE;
  --color-primary-dark: #3730A3;
  --color-accent: #10B981; /* 자연스러운 그린 */
  --color-accent-light: #ECFDF5;
  --color-bg-main: #F8FAFC;
  --color-bg-card: #FFFFFF;
  --color-border: #E2E8F0;
  --color-text-title: #0F172A; /* 차분한 네이비 슬레이트 */
  --color-text-body: #475569;
  --color-text-muted: #94A3B8;
  --font-sans: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 10px 25px -5px rgba(79, 70, 229, 0.08), 0 8px 10px -6px rgba(79, 70, 229, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font-sans); background: var(--color-bg-main); display: flex; justify-content: center; min-height: 100vh; color: var(--color-text-body); -webkit-font-smoothing: antialiased; }

/* 메인 프레임 */
.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--color-bg-card);
  box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
  position: relative;
  overflow-x: hidden;
}

/* 화면 전환 */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.on { display: flex; }

/* 탑바 스타일 최적화 */
.topbar {
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--color-bg-card);
  border-bottom: 1px solid var(--color-border);
}
.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--color-border);
  background: var(--color-bg-card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-body);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.back-btn:hover { background: var(--color-primary-light); color: var(--color-primary); border-color: #C7D2FE; }
.topbar-title { font-size: 17px; font-weight: 700; color: var(--color-text-title); letter-spacing: -0.5px; }
.tbadge {
  margin-left: auto;
  background: var(--color-primary-light);
  color: var(--color-primary);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}

/* 입체감 있는 모던 버튼 */
.btn {
  border: none;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius-md);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-p { background: var(--color-primary); color: #fff; padding: 15px 20px; width: 100%; box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25); }
.btn-p:hover { background: var(--color-primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3); }
.btn-p:active { transform: translateY(1px); }
.btn-g { background: #F8FAFC; color: var(--color-text-body); border: 1px solid var(--color-border); padding: 12px 14px; }
.btn-g:hover { border-color: var(--color-text-muted); color: var(--color-text-title); background: #F1F5F9; }

/* 입력 페이지 */
#si { padding: 24px 20px; overflow-y: auto; }
.hero { text-align: center; margin-bottom: 28px; }
.hero-ic { width: 56px; height: 56px; background: var(--color-primary-light); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 26px; }
.hero h1 { font-size: 33px; font-weight: 700; color: var(--color-text-title); margin-bottom: 8px; letter-spacing: -1px; line-height: 1.2; }
.hero p { font-size: 13px; color: var(--color-text-body); line-height: 1.6; font-weight: 400; padding: 0 10px; }

.fl { font-size: 12px; color: var(--color-text-title); margin-bottom: 8px; font-weight: 700; letter-spacing: -0.3px; }
.fw { margin-bottom: 18px; }
.cr { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }

/* 고급스러운 인풋 필드 */
input.inp {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-sans);
  background: var(--color-bg-card);
  color: var(--color-text-title);
  outline: none;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
input.inp:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12); }
input.inp::placeholder { color: var(--color-text-muted); font-size: 13px; }

/* 추천 선택 상자 */
.cp { margin-top: 6px; background: var(--color-bg-card); border: 1.5px solid #CBD5E1; border-radius: var(--radius-md); overflow: hidden; max-height: 180px; overflow-y: auto; display: none; box-shadow: var(--shadow-md); }
.cg { display: grid; grid-template-columns: repeat(4, 1fr); }
.cb { background: none; border: none; border-bottom: 1px solid var(--color-border); border-right: 1px solid var(--color-border); cursor: pointer; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: background 0.15s; }
.cb:hover { background: #F8FAFC; }
.cb.sel { background: var(--color-primary-light); }
.cb-h { font-size: 22px; font-weight: 700; color: var(--color-text-title); font-family: 'Noto Sans SC', sans-serif; }
.cb-m { font-size: 11px; color: var(--color-text-body); text-align: center; max-width: 70px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 500; }
.cb-p { font-size: 10px; color: var(--color-primary); font-weight: 700; letter-spacing: -0.2px; }
.cb.sel .cb-h { color: var(--color-primary); }

/* 선택 완료 칩 뱃지 */
.sb { display: inline-flex; align-items: center; gap: 6px; background: var(--color-primary-light); border: 1px solid #C7D2FE; border-radius: var(--radius-sm); padding: 5px 12px; margin-top: 6px; box-shadow: var(--shadow-sm); }
.sb-h { font-size: 16px; font-weight: 700; color: var(--color-primary); font-family: 'Noto Sans SC', sans-serif; }
.sb-info { font-size: 11px; color: #4338CA; font-weight: 500; }
.sb-x { background: none; border: none; cursor: pointer; color: #818CF8; font-size: 12px; padding: 0 2px; margin-left: 4px; font-weight: 700; }

/* 한글 이름 예시 섹션 */
.exb { background: #F8FAFC; border-radius: var(--radius-md); padding: 14px; margin: 8px 0 24px; border: 1px solid var(--color-border); }
.ex-t { font-size: 11px; color: var(--color-text-body); margin-bottom: 10px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
.ex-ch { display: flex; gap: 6px; flex-wrap: wrap; }
.ec { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 13px; font-weight: 500; color: var(--color-text-body); cursor: pointer; transition: all 0.15s; }
.ec:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-light); }

/* 결과 메인 대시보드 */
#sp { overflow-y: auto; }
.nh { background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%); margin: 16px 16px 20px; border-radius: var(--radius-lg); padding: 26px 20px; text-align: center; box-shadow: var(--shadow-md); }
.nh-label { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
.nh-trad { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 6px; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 4px; font-weight: 500; }
.nh-simp { font-size: 48px; font-weight: 700; color: #ffffff; margin-bottom: 4px; letter-spacing: 6px; font-family: 'Noto Sans SC', sans-serif; text-shadow: 0 4px 10px rgba(0,0,0,0.15); }
.nh-py { font-size: 16px; color: #C7D2FE; margin-bottom: 18px; letter-spacing: 0.5px; font-weight: 700; }

.pa { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25); color: #fff; border-radius: 30px; padding: 10px 24px; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-weight: 700; transition: all 0.2s; }
.pa:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); }

/* 글자 리스트 카드 */
.sl { font-size: 11px; color: var(--color-text-muted); padding: 0 20px 8px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.ccs { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 10px; }
.cc { background: var(--color-bg-card); border: 1.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 18px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--shadow-sm); }
.cc:hover { border-color: var(--color-primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.cc.done { border-color: var(--color-accent); background: var(--color-accent-light); }
.cl { display: flex; align-items: center; gap: 18px; }
.cc-chars { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 48px; }
.cc-trad-s { font-size: 11px; color: var(--color-text-muted); font-family: 'Noto Sans SC', sans-serif; min-height: 14px; font-weight: 500; }
.cc-simp-s { font-size: 34px; font-weight: 700; color: var(--color-primary); font-family: 'Noto Sans SC', sans-serif; line-height: 1; }
.cc-py { font-size: 12px; color: var(--color-primary); margin-bottom: 3px; font-weight: 700; }
.cc-ko { font-size: 14px; color: var(--color-text-title); font-weight: 700; }
.cr2 { display: flex; align-items: center; gap: 6px; color: var(--color-text-muted); }
.dm { color: var(--color-accent); font-weight: 700; font-size: 16px; }

/* 쓰기 연습 보드 */
#spr { overflow-y: auto; }
.ic { margin: 16px; background: var(--color-bg-card); border: 1.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); }
.ic-ko { font-size: 16px; font-weight: 700; color: var(--color-text-title); }
.ic-py { font-size: 14px; font-weight: 700; color: var(--color-primary); margin-top: 2px; }
.ic-chars-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
.ic-trad-l { font-size: 11px; color: var(--color-text-muted); font-family: 'Noto Sans SC', sans-serif; font-weight: 500; }
.ic-arr { font-size: 10px; color: var(--color-text-muted); }
.ic-simp-l { font-size: 14px; color: var(--color-primary); font-family: 'Noto Sans SC', sans-serif; font-weight: 700; }

.ww { display: flex; justify-content: center; padding: 0 16px 12px; }
.wb { width: 260px; height: 260px; border: 2px solid var(--color-primary); border-radius: var(--radius-lg); background: var(--color-bg-card); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
.wb::before, .wb::after { content: ''; position: absolute; pointer-events: none; }
.wb::before { width: 1px; height: 100%; background: #E2E8F0; left: 50%; border-left: 1.5px dashed var(--color-primary); opacity: 0.3; }
.wb::after { height: 1px; width: 100%; background: #E2E8F0; top: 50%; border-top: 1.5px dashed var(--color-primary); opacity: 0.3; }
.wm { position: absolute; font-size: 12px; color: var(--color-text-muted); text-align: center; padding: 12px; line-height: 1.6; z-index: 1; font-weight: 500; }

.dh { text-align: center; font-size: 13px; color: var(--color-accent); padding: 0 0 10px; opacity: 0; font-weight: 700; transition: opacity 0.3s; }
.dh.show { opacity: 1; }

.ar { padding: 0 16px; display: flex; gap: 8px; margin-bottom: 10px; }
.nr { padding: 0 16px 24px; display: flex; gap: 8px; }
.ar .btn-g, .nr button { flex: 1; }

/* 이름 해설 프리미엄 리포트 */
#smeaning { overflow-y: auto; }
.mhero { margin: 16px 16px 0; background: linear-gradient(135deg, #0F172A 0%, var(--color-primary-dark) 100%); border-radius: var(--radius-lg); padding: 22px 20px; text-align: center; box-shadow: var(--shadow-md); }
.mhero-simp { font-size: 38px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 4px; margin-bottom: 4px; }
.mhero-py { font-size: 15px; color: #C7D2FE; font-weight: 700; }

.report-box { padding: 20px 16px; margin: 16px; background: var(--color-bg-card); border: 1.5px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
.r-section { margin-bottom: 24px; border-bottom: 1px solid var(--color-border); padding-bottom: 20px; }
.r-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.r-title { font-size: 14px; font-weight: 700; color: var(--color-primary); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; letter-spacing: -0.3px; }
.r-char-row { display: flex; gap: 16px; margin-bottom: 12px; background: #F8FAFC; padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
.r-char-row:last-child { margin-bottom: 0; }
.r-char { font-size: 42px; font-weight: 700; font-family: 'Noto Sans SC', sans-serif; color: var(--color-primary); line-height: 1; display: flex; align-items: center; }
.r-char-desc { flex: 1; font-size: 13px; color: var(--color-text-body); line-height: 1.6; }
.r-ext-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
.r-ext-chip { background:#F1F5F9; color:var(--color-text-body); border:1px solid var(--color-border); border-radius:6px; font-size:11px; font-weight:700; padding:3px 8px; }
.r-basic, .r-symbol { margin-bottom: 8px; }
.r-basic:last-child, .r-symbol:last-child { margin-bottom: 0; }
.r-basic strong, .r-symbol strong { color: var(--color-text-title); font-weight: 700; font-size: 12px; display: block; margin-bottom: 2px; }
.r-text { font-size: 14px; color: var(--color-text-title); line-height: 1.7; padding: 4px 0; font-weight: 500; }
.r-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.r-tag { background: var(--color-primary-light); color: #4338CA; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid #C7D2FE; }
.r-summary { font-size: 15px; font-weight: 700; color: var(--color-accent); text-align: center; padding: 16px; background: var(--color-accent-light); border-radius: var(--radius-md); border: 1px solid #A7F3D0; }

/* 엔딩 완료 화면 */
#sc { align-items: center; justify-content: center; padding: 36px 24px; text-align: center; }
.ci { width: 80px; height: 80px; background: var(--color-accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 38px; border: 2px solid #A7F3D0; }
.c-simp { font-size: 38px; font-weight: 700; color: var(--color-primary); margin-bottom: 4px; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 2px; }
.c-trad { font-size: 12px; color: var(--color-text-muted); margin-bottom: 4px; font-family: 'Noto Sans SC', sans-serif; }
.cy { font-size: 16px; font-weight: 700; color: var(--color-primary-dark); margin-bottom: 16px; }
.ct { font-size: 21px; font-weight: 700; color: var(--color-text-title); margin-bottom: 8px; letter-spacing: -0.5px; }
.cs { font-size: 14px; color: var(--color-text-body); line-height: 1.7; margin-bottom: 24px; }
.cbs { width: 100%; display: flex; flex-direction: column; gap: 10px; }

/* 로딩 화면 스타일 */
#loader {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--color-bg-card); display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100;
}
.spinner {
  width: 44px; height: 44px; border: 4px solid var(--color-border);
  border-top: 4px solid var(--color-primary); border-radius: 50%;
  animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; margin-bottom: 16px;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media print {
  body { background: white; }
  .app { max-width: 100%; box-shadow: none; min-height: auto; }
  .topbar, .back-btn, .snd, .ar, .nr, .mbtn-row, .cbs, .pa { display: none !important; }
  .screen.on { display: block; }
  .hero, .nh, .mhero { background: white !important; color: black !important; border: 1px solid #ccc; }
  .nh-simp, .nh-trad, .nh-py, .mhero-simp, .mhero-py { color: black !important; }
  .wb { border: 1px solid #000; break-inside: avoid; margin: 0 auto; }
  .cc { border: 1px solid #000; break-inside: avoid; }
  .report-box { border: 1px solid #000; break-inside: avoid; }
  .exb, .fw, .cr { display: none; }
  #pb { display: block; }
}
</style>

<!-- ⚡ 핵심 CDN 라이브러리 연동 (실시간 변환 엔진) -->
<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<script src="https://unpkg.com/pinyin-pro"></script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body>

<div class="app">
  <!-- 로딩 화면 -->
  <div id="loader">
    <div class="spinner"></div>
    <div id="loader-text" style="font-size:14px; color:var(--color-text-body); font-weight:700;">인명 한자 사전 통합 분석 중...</div>
  </div>

  <audio id="tts-audio" crossorigin="anonymous" referrerpolicy="no-referrer"></audio>

  <!-- 메인 화면 -->
  <div class="screen on" id="si">
    <div style="padding:10px 0 0">
      <div class="hero">
        <div class="hero-ic">✍️</div>
        <h1>내 이름은 중국어로...</h1>
        <p>이름의 음 부분을 입력 → 한자 선택 → 간화자 쓰기 및 발음 연습</p>
      </div>
      <div class="fw">
        <div class="fl">성 (필수)</div>
        <input class="inp" id="if" placeholder="예: 김, 박, 이, 손, 장, 최, 지, 호..." maxlength="4" autocomplete="off">
        <div class="cp" id="cf"></div>
        <div id="sf"></div>
      </div>
      <div class="cr">
        <div>
          <div class="fl">이름 첫째 (필수)</div>
          <input class="inp" id="i1" placeholder="예: 현" maxlength="3" autocomplete="off">
          <div class="cp" id="c1"></div>
          <div id="s1"></div>
        </div>
        <div>
          <div class="fl">이름 둘째 (선택)</div>
          <input class="inp" id="i2" placeholder="예: 수  ※외자면 비워두기" maxlength="3" autocomplete="off">
          <div class="cp" id="c2"></div>
          <div id="s2"></div>
        </div>
      </div>
      <div class="exb">
        <div class="ex-t">💡 예시 클릭해보기</div>
        <div class="ex-ch">
          <span class="ec" onclick="fex('김','현','정')">김현정</span>
          <span class="ec" onclick="fex('이','준','호')">이준호</span>
          <span class="ec" onclick="fex('박','민','지')">박민지</span>
          <span class="ec" onclick="fex('손','수','연')">손수연</span>
          <span class="ec" onclick="fex('장','유','진')">장유진</span>
          <span class="ec" onclick="fex('최','서','연')">최서연</span>
        </div>
      </div>
      <div class="err" id="eb"></div>
      <button class="btn btn-p" onclick="sub()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        이름 변환하기 (간화자로 변환)
      </button>
    </div>
  </div>

  <!-- 이름 프리뷰 스크린 -->
  <div class="screen" id="sp">
    <div class="topbar">
      <button class="back-btn" onclick="go('si')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>

// 1. ⚡ 3개 한자 파일(first_name.csv, data-naver.csv, data-gov.csv) 비동기 순차/병렬 연동 및 하이브리드 예외 처리
async function loadAllDatabase() {
  const loaderText = document.getElementById('loader-text');
  try {
    // 3개 자원을 병렬 fetch 로드하여 브라우저 로딩 지연 극소화
    const [resFirstName, resDataNaver, resDataGov] = await Promise.all([
      fetch('first_name.csv'),
      fetch('data-naver.csv'),
      fetch('data-gov.csv')
    ]);

    if (!resFirstName.ok || !resDataNaver.ok || !resDataGov.ok) {
      throw new Error('필수 CSV 데이터 누락');
    }

    const txtFirstName = await resFirstName.text();
    const txtDataNaver = await resDataNaver.text();
    const txtDataGov = await resDataGov.text();

    // 1단계: 성씨 사전 (first_name.csv) 파싱 -> SDB 객체 동적 형성
    parseFirstNameCSV(txtFirstName);

    // 2단계: 네이버 정밀 대법원 한자 (data-naver.csv) 파싱
    parseNaverCSV(txtDataNaver);

    // 3단계: 정부 인명용 추가 한자 (data-gov.csv) 교차 검증 및 무중복 병합

// 📌 first_name.csv 파싱 -> SDB 동적 빌드
function parseFirstNameCSV(csvText) {
  const lines = csvText.split('\n');
  const regex = /^([가-힣]+)\(([^)]+)\)/;

  // 간체 전용 자형 블랙리스트 (CSV에 섞여있는 순수 간체자들)
  // 번체가 따로 있는 경우만 제거 — 번체 없이 간체만 쓰는 글자는 유지
  const SIMPLIFIED_ONLY = new Set([
    "张","长","陈","刘","马","罗","钱","孙","朱","赵","钟",
    "郑","冯","严","华","鲁","韩","贾","许","凤","乔","龙",
    "廖","梁","蒋","盘","蓝","农","覃","莫","潘","魏","丛",
    "贝","叶","阎","阳","丁","邓","毛","仇","区","巩","吕",
    "吴","岑","尚","欧","郎","项","龚","粱","涂","渝"
  ]);

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    
    const match = line.match(regex);
    if (match) {
      const hangul = match[1];
      const trad = match[2];

      // 블랙리스트 간체자 제거
      if (SIMPLIFIED_ONLY.has(trad)) continue;

      if (!SDB[hangul]) SDB[hangul] = [];

      // 같은 번체자 중복 방지
      const dupTrad = SDB[hangul].some(it => it[0] === trad);
      if (dupTrad) continue;

      // simp, py는 rc() display 시점에 실시간 생성 (OpenCC/pinyinPro 로드 보장)
      SDB[hangul].push([trad, '', '']);
    }
  }
}

// 📌 data-naver.csv 파싱 -> GLOBAL_NDB 빌드 (훈음 뜻풀이 확보)
function parseNaverCSV(csvText) {
  const lines = csvText.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    
    const parts = line.split(',');
    if (parts.length < 5) continue;
    
    const hangul = parts[0].trim();
    const hanja = parts[3].trim();
    let meaning = parts[4].trim();
    
    if (meaning.endsWith(hangul)) {
      meaning = meaning.slice(0, -hangul.length).trim();
    }
    
    if (!GLOBAL_NDB[hangul]) {
      GLOBAL_NDB[hangul] = [];
    }
    GLOBAL_NDB[hangul].push([hanja, meaning]);
  }
}

// 📌 data-gov.csv 파싱 -> 누락 한자 중복 검사 후 무중복 교차 병합
function parseGovCSV(csvText) {
  const lines = csvText.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    
    const parts = line.split(',');
    if (parts.length < 4) continue;
    
    const hangul = parts[0].replace(/"/g, '').trim();
    const hanja = parts[3].replace(/"/g, '').trim();
    
    if (!GLOBAL_NDB[hangul]) {
      GLOBAL_NDB[hangul] = [];
    }
    
    // 번체자 중복 검사 후 누락 한자만 사전 풀에 밀어 넣음
    const exists = GLOBAL_NDB[hangul].some(item => item[0] === hanja);
    if (!exists) {
      GLOBAL_NDB[hangul].push([hanja, ""]); // 추가된 한자는 빈 의미로 초기화(추후 실시간 병음 처리)
    }
  }
}

// 2. 🗣️ 제작자와 사용자 모두 평생 완전 무료인 브라우저 내장 TTS (Web Speech API) 적용
function playSpeech(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.7;
    
    const voices = window.speechSynthesis.getVoices();
    const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('ZH'));
    if (zhVoice) utterance.voice = zhVoice;
    
    window.speechSynthesis.speak(utterance);
  } else {
    const url = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=zh-CN&q=${encodeURIComponent(text)}`;
    const audio = new Audio(url);
    audio.play().catch(e => console.log('Backup TTS Error:', e));
  }
}

let sel={f:null,g1:null,g2:null},curName=[],pi=0,doneSet=new Set(),cDone=false,hw=null;

function formatPinyin(arr) {
  if (!arr || arr.length === 0) return "";
  const capitalize = (str) => {
    if (!str) return "";
    return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
  };
  const family = capitalize(arr[0].py);
  let given = "";
  if (arr.length > 1) {
    let rawGiven = arr.slice(1).map(d => d.py).join('');
    given = " " + capitalize(rawGiven);
  }
  return family + given;
}

}

// ⚡ 한자 목록 표시: 성씨는 번체만, 이름은 번체+간체+병음 실시간 변환
function rc(field,sound){
  const panel=document.getElementById('c'+field),isFam=field==='f';
  if(!sound) { panel.style.display='none'; return; }
  
  let raw = [];
  if(isFam) {
    // 성씨: 번체(trad)만 표시 — 간화자 변환은 '이름 변환하기' 클릭 시점에 처리
    raw = (SDB[sound] || []).map(it => {
      const trad = it[0];
      // 병음: 번체 기준으로 생성
      if (!it[2] && typeof pinyinPro !== 'undefined') {
        it[2] = pinyinPro.pinyin(trad, { toneType: 'symbol', v: true });
      }
      const py = it[2] || '';
      return [trad, py]; // simp는 이 단계에서 불필요
    });
  } else {
    const src = GLOBAL_NDB[sound] || [];
    raw = src.map(it => {
      const trad = it[0];
      const meaning = it[1];
      const simp = toSimplified(trad);
      let py = '';
      if(typeof pinyinPro !== 'undefined') {
        py = pinyinPro.pinyin(simp, { toneType: 'symbol', v: true });
      }
      return [trad, simp, meaning, py];
    });
  }
  
  if(!raw.length){panel.style.display='none';return;}
  panel.style.display='block';
  const g=document.createElement('div');g.className='cg';
  raw.forEach(it=>{
    const trad=it[0];
    const meaning=isFam?'':it[2];
    const py=(isFam?it[1]:it[3])||'';
    const simp=isFam?trad:(it[1]||trad); // 성씨는 일단 trad=simp로 임시 저장, sub()에서 변환
    const b=document.createElement('button');b.className='cb'+(sel[field]?.trad===trad?' sel':'');
    b.innerHTML=`<span class="cb-h">${trad}</span>${meaning?`<span class="cb-m">${meaning}</span>`:''}<span class="cb-p">${py}</span>`;
    b.onclick=()=>selH(field,{trad,simp,meaning,sound,py});
    g.appendChild(b);
  });
  panel.innerHTML='';panel.appendChild(g);
}

function selH(field,item){
  sel[field]=item;
  rc(field,item.sound);
  const sb=document.getElementById('s'+field);
  // 성씨는 번체만 표시 (간화자 표시 안 함)
  const isFam = field==='f';
  if(isFam){
    sb.innerHTML=`<div class="sb"><span class="sb-h">${item.trad}</span><span class="sb-info">${item.py}</span><button class="sb-x" onclick="clrF('${field}')">✕</button></div>`;
  } else {
    const same=item.trad===item.simp;
    sb.innerHTML=`<div class="sb"><span class="sb-h">${item.trad}</span>${!same?`<span style="font-size:9px;color:#AFA9EC">→${item.simp}</span>`:''}<span class="sb-info">${item.meaning?item.meaning+' · ':''}${item.py}</span><button class="sb-x" onclick="clrF('${field}')">✕</button></div>`;
  }
}

function clrF(field){
  sel[field]=null;
  document.getElementById('s'+field).innerHTML='';
  document.getElementById('i'+field).value='';
  document.getElementById('c'+field).style.display='none';
}

['f','1','2'].forEach(f=>{
  const el=document.getElementById('i'+f);
  if(!el)return;
  el.addEventListener('input',e=>{
    const v=e.target.value.trim();
    sel[f]=null;document.getElementById('s'+f).innerHTML='';rc(f,v);
  });
});

  rc('f',fa);rc('1',g1);if(g2)rc('2',g2);
  setTimeout(()=>{
    function auto(field,sound,isFam){
      if(isFam){
        const it=(SDB[sound]||[])[0];if(!it)return;
        // simp·py가 아직 없으면 지금 생성
        if(!it[1]) it[1]=toSimplified(it[0]);
        if(!it[2]&&typeof pinyinPro!=='undefined') it[2]=pinyinPro.pinyin(it[1],{toneType:'symbol',v:true});
        selH(field,{trad:it[0],simp:it[1],meaning:'',sound,py:it[2]||''});
      } else {
        const src=(GLOBAL_NDB[sound]||[])[0];if(!src)return;
        const trad = src[0], meaning = src[1];
        const simp = toSimplified(trad);
        const py = typeof pinyinPro !== 'undefined' ? pinyinPro.pinyin(simp, { toneType: 'symbol', v: true }) : "";
        selH(field,{trad,simp,meaning,sound,py});
      }
    }
    auto('f',fa,true);auto('1',g1,false);if(g2)auto('2',g2,false);
  },120);
}

function sub(){
  const eb=document.getElementById('eb');
  if(!sel.f){eb.style.display='block';eb.textContent='성의 한자를 선택해주세요.';return;}
  if(!sel['1']){eb.style.display='block';eb.textContent='이름 첫째 한자를 선택해주세요.';return;}
  eb.style.display='none';

  // ✅ '이름 변환하기' 클릭 시점에 모든 글자 간화자 변환
  function resolveSimp(item) {
    const simp = toSimplified(item.trad);
    const py = typeof pinyinPro !== 'undefined'
      ? pinyinPro.pinyin(simp, { toneType: 'symbol', v: true })
      : item.py;
    return { ...item, simp, py };
  }

  curName = [resolveSimp(sel.f), resolveSimp(sel['1'])];
  if(sel['2']) curName.push(resolveSimp(sel['2']));
  doneSet=new Set();cDone=false;
  buildPrev();go('sp');
}

function initP(){
  cDone=false;
  const d=curName[pi],tradDiff=d.trad!==d.simp;
  document.getElementById('pr-trad').textContent=tradDiff?d.trad:'';
  document.getElementById('pr-arr').textContent=tradDiff?' → ':'';
  document.getElementById('pr-simp-lbl').textContent=tradDiff?d.simp+' (간체)':'';
  document.getElementById('pr-ko').textContent=d.meaning?d.meaning+'('+d.sound+')':d.sound;
  document.getElementById('pr-py').textContent=d.py;
  document.getElementById('prb').textContent=`${pi+1} / ${curName.length}`;
  document.getElementById('pr-snd').onclick=()=>playSpeech(d.simp);
  document.getElementById('dh').classList.remove('show');
  updNav();
  const box=document.getElementById('wb');
  box.innerHTML='<div class="wm">로딩 중...</div>';hw=null;
  const tw=()=>{if(window.HanziWriter)startW(d.simp);else setTimeout(tw,300);};tw();
}

function startW(char){
  const box=document.getElementById('wb');box.innerHTML='';
  try{
    hw=HanziWriter.create(box,char,{
      width:240,height:240,padding:25,
      strokeAnimationSpeed:1.2,delayBetweenStrokes:150,
      strokeColor:'#4F46E5',drawingColor:'#10b981',drawingWidth:12,
      showOutline:true,outlineColor:'#e2e8f0',highlightColor:'#C7D2FE',showHintAfterMisses:2,
      onLoadCharDataSuccess:()=>hw.quiz({onComplete:onDone}),
      onLoadCharDataError:()=>{box.innerHTML=`<div class="wm">⚠️ 획순 데이터 없음<br><small>${char}(간체)</small></div>`;}
    });
  }catch(e){box.innerHTML='<div class="wm">오류가 발생했습니다</div>';}
}

function onDone(){
  cDone=true;doneSet.add(pi);
  document.getElementById('dh').classList.add('show');
  playSpeech(curName[pi].simp);
  updNav();buildPrev();
}

function updNav(){
  const pb=document.getElementById('pb2'),nb=document.getElementById('nb');
  pb.disabled=pi===0;
  const isLast=pi===curName.length-1,allDone=doneSet.size===curName.length;
  if(isLast&&allDone){nb.textContent='완료 🎉';nb.disabled=false;nb.onclick=()=>go('sc');}
  else if(isLast){nb.textContent='마지막 글자';nb.disabled=true;nb.onclick=null;}
  else{nb.textContent='다음 →';nb.disabled=false;nb.onclick=()=>nch();}
}

function nch(){if(pi<curName.length-1){pi++;initP();}}
function pch(){if(pi>0){pi--;initP();}}
function anim(){hw?.animateCharacter();}
function retry(){cDone=false;document.getElementById('dh').classList.remove('show');hw?.quiz({onComplete:onDone});updNav();}

function normalizeMeaning(mean) {
  if(!mean) return "";
  let m = mean.trim().replace(/\s*\(.*?\)\s*/g, ''); 
  
  const exact = {
    "바를": "바르다", "어질": "어질다", "굳셀": "굳세다", "클": "크다", "길": "길다",
    "밝을": "밝다", "맑을": "맑다", "높을": "높다", "깊을": "깊다", "넓을": "넓다",
    "아름다울": "아름답다", "고울": "곱다", "순할": "순하다", "착할": "착하다",
    "검을": "검다", "흴": "희다", "붉을": "붉다", "푸를": "푸르다", "좋을": "좋다",
    "굳을": "굳다", "귀할": "귀하다", "슬기로울": "슬기롭다", "뛰어날": "뛰어나다",
    "빛날": "빛나다", "편안할": "편안하다", "즐길": "즐기다", "지탱할": "지탱하다",
    "이룰": "이루다", "베풀": "베풀다", "세울": "세우다", "도울": "돕다"
  };
  if(exact[m]) return exact[m];
  
  const rules = [
    { e: '를', r: '르다' }, { e: '을', r: '다' }, { e: '은', r: '다' },
    { e: '셀', r: '세다' }, { e: '질', r: '질다' }, { e: '할', r: '하다' },
    { e: '로운', r: '롭다' }, { e: '운', r: '우다' }, { e: '클', r: '크다' },
    { e: '길', r: '길다' }, { e: '멀', r: '멀다' }, { e: '빌', r: '비다' },
    { e: '살', r: '살다' }, { e: '될', r: '되다' }
  ];
  for(let r of rules) {
    if(m.endsWith(r.e)) return m.slice(0, -r.e.length) + r.r;
  }
  return m; 
}

function goMeaning() {
  go('smeaning');
  const nameOnly = curName.slice(1);
  if (nameOnly.length === 0) {
      document.getElementById('mhero-wrap').innerHTML = '<div style="padding:20px;text-align:center;">이름 글자가 선택되지 않았습니다.</div>';
      return;
  }
  const sz = nameOnly.map(d => d.simp).join('');
  const pyFormat = formatPinyin(curName).split(' ').slice(1).join('');

  document.getElementById('mhero-wrap').innerHTML=`
    <div class="mhero">
      <div class="mhero-simp">${sz}</div>
      <div class="mhero-py">${pyFormat}</div>
    </div>`;
  
  generateAndRenderReport(nameOnly);
}

function generateAndRenderReport(givenNameArr) {
  const isOneChar = givenNameArr.length === 1;
  let html = `<div class="report-box">`;
  
  // 각 글자 DB 조회
  const semArr = givenNameArr.map(d => ({
    d,
    sem: getExtendedMeaning(normalizeMeaning(d.meaning), d.trad)
  }));
  
  // 📖 한자 의미
  html += `<div class="r-section"><div class="r-title">📖 한자 의미</div>`;
  semArr.forEach(({ d, sem }) => {
    html += `
    <div class="r-char-row">
      <div class="r-char">${d.trad}</div>
      <div class="r-char-desc">
        <div class="r-basic">${sem.basic}</div>
        <div class="r-ext-tags">${sem.ext.map(t=>`<span class="r-ext-chip">${t}</span>`).join('')}</div>
      </div>
    </div>`;
  });
  html += `</div>`;
  
  // ✨ 이름 풀이 — ext 키워드를 엮어 자연스러운 문장 생성
  html += `<div class="r-section"><div class="r-title">✨ 이름 풀이</div><div class="r-text">`;
  const nameStr = givenNameArr.map(d=>d.trad).join('');
  const sem1 = semArr[0].sem;
  
  if (isOneChar) {
    html += `"${nameStr}"은(는) ${sem1.action} 나아가는 사람이라는 의미로 해석할 수 있습니다.`;
  } else {
    const sem2 = semArr[1].sem;
    const ext1 = sem1.ext.slice(0,2).join('·');
    const ext2 = sem2.ext.slice(0,2).join('·');
    // 두 카테고리가 같으면 중복 없이 합침
    if (sem1.category === sem2.category) {
      html += `"${nameStr}"은(는) ${ext1}과 ${ext2}을(를) 겸비하여 ${sem1.action} 더욱 깊이 있는 사람이라는 의미로 해석할 수 있습니다.`;
    } else {
      html += `"${nameStr}"은(는) ${sem1.action} ${sem2.action} 자신만의 뚜렷한 발자취를 남기는 사람이라는 의미로 해석할 수 있습니다.`;
    }
  }
  html += `</div></div>`;
  
  // 💭 이미지 태그
  html += `<div class="r-section"><div class="r-title">💭 떠오르는 이미지</div><div class="r-tags">`;
  const tags = [];
  semArr.forEach(({ sem }) => sem.tags.forEach(t => tags.push(t)));
  [...new Set(tags)].slice(0, 4).forEach(t => { html += `<span class="r-tag">${t}</span>`; });
  html += `</div></div>`;
  
  // 🎯 한 줄 해석
  html += `<div class="r-section"><div class="r-title">🎯 한 줄 해석</div><div class="r-summary">`;
  if (isOneChar) {
     html += `"${sem1.tags[0]}으로 삶을 개척해 나가는 이름"`;
  } else {
     const sem2 = semArr[1].sem;
     const e1 = sem1.ext[0], e2 = sem2.ext[0];
     if (e1 === e2) {
       html += `"${e1}의 기상과 ${sem1.tags[0]}의 품성을 지닌 이름"`;
     } else {
       html += `"${e1}의 기상과 ${e2}의 품성을 함께 갖춘 이름"`;
     }
  }
  html += `</div></div></div>`;
  
  document.getElementById('mcontent').innerHTML = html;
}
