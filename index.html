<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>'내 이름은 중국어로...'</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  --color-primary: #4F46E5; /* 프리미엄 인디고 */
  --color-primary-light: #EEEDFE;
  --color-primary-dark: #3730A3;
  --color-accent: #10B981; /* 자연스러운 그린 */
  --color-accent-light: #ECFDF5;
  --color-bg-main: #F8FAFC;
  --color-bg-card: #FFFFFF;
  --color-border: #E2E8F0;
  --color-text-title: #0F172A; /* 차분한 네이비 슬레이트 */
  --color-text-body: #475569;
  --color-text-muted: #94A3B8;
  --font-sans: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background-color: var(--color-bg-main);
  color: var(--color-text-body);
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
  padding: 20px 10px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: var(--color-bg-card);
  border-radius: 24px;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
  padding: 30px 20px;
  border: 1px solid var(--color-border);
}

.hero {
  text-align: center;
  margin-bottom: 30px;
}
.hero-ic {
  font-size: 3rem;
  margin-bottom: 10px;
}
.hero h1 {
  font-size: 1.8rem;
  color: var(--color-text-title);
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.hero p {
  font-size: 0.95rem;
  color: var(--text-muted);
}

/* 입력 영역 */
.input-group {
  margin-bottom: 25px;
}
.label-style {
  display: block;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--color-text-title);
  margin-bottom: 8px;
}
.input-wrapper {
  position: relative;
  display: flex;
  gap: 8px;
}
input[type="text"] {
  flex: 1;
  padding: 14px 16px;
  font-size: 1.1rem;
  border: 1px solid var(--color-border);
  border-radius: 14px;
  outline: none;
  transition: all 0.2s ease;
  font-weight: 500;
}
input[type="text"]:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 4px var(--color-primary-light);
}
.btn-search {
  background-color: var(--color-primary);
  color: white;
  border: none;
  padding: 0 24px;
  border-radius: 14px;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-search:hover {
  background-color: var(--color-primary-dark);
}

/* 글자별 선택 가이드 영역 */
.selection-area {
  background: var(--color-bg-main);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 25px;
  border: 1px dashed var(--color-border);
}
.step-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.char-select-row {
  margin-bottom: 20px;
}
.char-select-row:last-child { margin-bottom: 0; }
.row-label {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--color-text-title);
  margin-bottom: 8px;
}
.hanja-options {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.hanja-btn {
  background: white;
  border: 1px solid var(--color-border);
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  flex-direction: column;
  min-width: 70px;
}
.hanja-btn:hover {
  border-color: var(--color-primary);
  background: var(--color-primary-light);
}
.hanja-btn.active {
  border-color: var(--color-primary);
  background: var(--color-primary);
  color: white;
}
.hanja-btn .h-char {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 2px;
  font-family: 'Noto Sans SC', sans-serif;
}
.hanja-btn .h-mean {
  font-size: 0.75rem;
  opacity: 0.8;
}

/* 결과 프리미엄 카드 */
.result-card {
  background: white;
  border: 1px solid var(--color-border);
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
}
.result-header {
  text-align: center;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--color-bg-main);
  margin-bottom: 20px;
}
.res-name-main {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--color-text-title);
  letter-spacing: 2px;
  font-family: 'Noto Sans SC', sans-serif;
  margin-bottom: 5px;
}
.res-pinyin {
  font-size: 1.2rem;
  color: var(--color-primary);
  font-weight: 600;
}
.res-kor-sub {
  font-size: 1rem;
  color: var(--color-text-muted);
  margin-top: 4px;
}

/* 이름 해석 섹션들 */
.r-section {
  margin-bottom: 22px;
}
.r-section:last-child { margin-bottom: 0; }
.r-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--color-text-title);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.r-text {
  font-size: 0.95rem;
  color: var(--color-text-body);
  background: var(--color-bg-main);
  padding: 14px 16px;
  border-radius: 12px;
  white-space: pre-line;
}

/* 태그 그룹 스타일 */
.r-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.r-tag {
  background: var(--color-primary-light);
  color: var(--color-primary-dark);
  font-size: 0.85rem;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 20px;
}

/* 획순 보기 링크 버튼 */
.btn-stroke-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--color-accent-light);
  color: var(--color-accent);
  padding: 8px 14px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 600;
  transition: opacity 0.2s;
  margin-top: 5px;
}
.btn-stroke-link:hover { opacity: 0.9; }

/* 오디오 버튼 */
.btn-audio {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.2rem;
  color: var(--color-primary);
  vertical-align: middle;
  margin-left: 6px;
  transition: transform 0.1s;
}
.btn-audio:active { transform: scale(0.9); }

/* 로딩 애니메이션 */
.loading-box {
  text-align: center;
  padding: 40px 0;
  color: var(--color-text-muted);
}
.spinner {
  width: 30px;
  height: 30px;
  border: 3px solid var(--color-border);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <div class="hero-ic">✍️</div>
    <h1>내 이름은 중국어로...</h1>
    <p>이름의 음 부분을 입력 → 한자 선택 → 간화자 쓰기 및 발음 연습</p>
  </div>

  <div class="input-group">
    <label class="label-style">성 제외 이름 입력 (예: 현정, 지우)</label>
    <div class="input-wrapper">
      <input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="3">
      <button class="btn-search" id="btnSearch">변환</button>
    </div>
  </div>

  <div id="loadingBox" class="loading-box hidden">
    <div class="spinner"></div>
    <div id="loadingText">인명용 한자 데이터베이스 로드 중...</div>
  </div>

  <div id="selectionArea" class="selection-area hidden">
    <div class="step-title">💡 각 글자에 맞는 한자를 골라주세요</div>
    <div id="selectionRowsContainer"></div>
  </div>

  <div id="resultCard" class="result-card hidden">
    <div class="result-header">
      <div class="res-name-main" id="resSimplified">炫政</div>
      <div>
        <span class="res-pinyin" id="resPinyin">Xuàn zhèng</span>
        <button class="btn-audio" id="btnPlayAudio" title="발음 듣기">🔊</button>
      </div>
      <div class="res-kor-sub" id="resTraditional">(한자 원문: 炫政)</div>
    </div>

    <div id="interpretationContainer"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
let dbData = []; 
const CSV_URL = "https://raw.githubusercontent.com/mathsetkk0102/nft/main/h_gpt.csv"; 

window.addEventListener('DOMContentLoaded', () => {
  loadCSV();
  document.getElementById('btnSearch').addEventListener('click', handleSearch);
  document.getElementById('nameInput').addEventListener('keyup', (e) => {
    if(e.key === 'Enter') handleSearch();
  });
  document.getElementById('btnPlayAudio').addEventListener('click', playAudio);
});

function loadCSV() {
  showLoading("인명용 한자 데이터베이스 로드 중...");
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      dbData = results.data;
      hideLoading();
    },
    error: function(err) {
      console.error("CSV 로드 실패:", err);
      showLoading("데이터를 가져오지 못했습니다. 파일 경로를 확인해주세요.");
    }
  });
}

function handleSearch() {
  const input = document.getElementById('nameInput').value.trim();
  if(!input) {
    alert("이름을 입력해주세요.");
    return;
  }
  
  const chars = input.split('');
  const container = document.getElementById('selectionRowsContainer');
  container.innerHTML = "";
  
  let hasData = false;
  
  chars.forEach((char, idx) => {
    const matches = dbData.filter(d => d.훈음 && d.훈음.trim().startsWith(char));
    if(matches.length > 0) {
      hasData = true;
      const row = document.createElement('div');
      row.className = "char-select-row";
      row.setAttribute('data-index', idx);
      row.setAttribute('data-origin-char', char);
      
      const label = document.createElement('div');
      label.className = "row-label";
      label.innerText = `[${char}] 글자 선택`;
      row.appendChild(label);
      
      const optionsDiv = document.createElement('div');
      optionsDiv.className = "hanja-options";
      
      matches.forEach((m, mIdx) => {
        const btn = document.createElement('button');
        btn.className = "hanja-btn";
        if(mIdx === 0) btn.classList.add('active');
        
        btn.setAttribute('data-trad', m.漢字 || m.한자 || "");
        btn.setAttribute('data-simp', m.간화자 || m.간체자 || m.漢字 || m.한자 || "");
        btn.setAttribute('data-pinyin', m.병음 || "");
        btn.setAttribute('data-meaning', m.기본뜻 || m.뜻 || m.훈음 || "");
        
        btn.innerHTML = `
          <span class="h-char">${m.漢字 || m.한자}</span>
          <span class="h-mean">${m.훈음}</span>
        `;
        
        btn.addEventListener('click', () => {
          row.querySelectorAll('.hanja-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          buildFinalResult();
        });
        
        optionsDiv.appendChild(btn);
      });
      
      row.appendChild(optionsDiv);
      container.appendChild(row);
    }
  });
  
  if(!hasData) {
    alert("해당 이름의 한자를 데이터베이스에서 찾을 수 없습니다.");
    document.getElementById('selectionArea').classList.add('hidden');
    document.getElementById('resultCard').classList.add('hidden');
    return;
  }
  
  document.getElementById('selectionArea').classList.remove('hidden');
  buildFinalResult();
}

function normalizeMeaning(str) {
  if(!str) return "";
  let clean = str.split(';')[0].split(',')[0].trim();
  clean = clean.replace(/[a-zA-Z]/g, '');
  return clean;
}

// 텍스트 매칭 규칙 기반의 안전하고 유려한 고품질 문장 반환 시스템 (오류 원천 차단)
function getExtendedMeaning(meaningStr) {
  const base = {
    ext: "자신만의 고유하고 특별한 역량을 바탕으로 가치를 창출함을 의미합니다.",
    action: "자신만의 고유한 자질과 역량을 단단하게 발휘하여",
    line: "고유한 가치를 세상에 드러내고 조화롭게 삶을 채워나가는 삶",
    tags: ["고유한 특성을 지닌 사람", "조화로운 사람", "성실한 사람"]
  };

  if(!meaningStr) return base;

  const rules = [
    { keys: ['빛', '밝', '비추', '나타나', '현'], ext: "주위를 환하게 비추며 명확한 비전과 방향을 제시하는 자질을 의미합니다.", action: "명확한 통찰력으로 주변을 따뜻하고 밝게 비추며 스스로의 길을 열어가고", line: "밝은 비전과 지혜로 세상에 긍정적인 영향력을 전하는 삶", tags: ["방향을 제시하는 사람", "통찰력 있는 사람", "명료한 사람", "빛이 되는 사람"] },
    { keys: ['다스리', '정사', '임금', '이끌', '주장', '정치'], ext: "책임감을 가지고 질서를 세우고 조직이나 주위를 이끄는 태도를 의미합니다.", action: "조직을 조화롭게 이끌고 질서를 세우는 책임감과", line: "원칙과 리더십을 바탕으로 중심을 잡고 공동체를 이끄는 삶", tags: ["책임감 있는 사람", "중심을 잡는 사람", "리더십 있는 사람"] },
    { keys: ['깊', '검', '오묘', '고요', '무겁'], ext: "사물의 본질을 꿰뚫는 깊이 있는 사고와 신중하고 묵직한 판단력을 의미합니다.", action: "신중하고 깊이 있는 사색을 바탕으로 본질을 통찰하며", line: "진중하고 오묘한 이치를 깨달아 학문이나 내면의 깊이를 더해가는 삶", tags: ["생각이 깊은 사람", "신중한 사람", "통찰력 있는 사람", "내면이 단단한 사람"] },
    { keys: ['뜻', '의지', '굳세', '힘쓰', '높'], ext: "뚜렷한 목적의식을 가지고 흔들림 없이 자신의 뜻과 의지를 관철하는 자질을 의미합니다.", action: "높은 이상과 뚜렷한 목표를 향해 흔들림 없이 전진하며", line: "확고한 뜻과 굳건한 의지로 마침내 원하는 바를 성취해내는 삶", tags: ["의지가 강한 사람", "목표가 명확한 사람", "끊임없이 노력하는 사람"] },
    { keys: ['넓', '크', '포용', '바다', '가득'], ext: "바다나 큰 물처럼 넓은 도량과 포용력으로 세상과 사람을 품는 그릇을 의미합니다.", action: "넓은 마음과 포용력으로 다채로운 세상을 포용하고 아우르며", line: "큰 강물처럼 막힘없이 흐르며 많은 사람들에게 이로움을 베푸는 삶", tags: ["포용력 있는 사람", "도량이 넓은 사람", "여유로운 사람"] },
    { keys: ['지혜', '슬기', '알', '깨닫', '맑'], ext: "사물의 이치를 빠르게 깨닫고 명석하게 문제를 해결하는 슬기를 의미합니다.", action: "지혜롭고 현명한 눈으로 세상의 문제를 슬기롭게 풀어내며", line: "명석한 두뇌와 유연한 지혜로 올바른 선택을 내리는 삶", tags: ["지혜로운 사람", "현명한 사람", "슬기로운 사람", "지성적인 사람"] },
    { keys: ['어질', '덕', '아름다', '착하', '은혜'], ext: "도덕적 인품과 따뜻한 성정으로 사람들의 존경과 신뢰를 받는 미덕을 의미합니다.", action: "어질고 은혜로운 인품으로 타인을 배려하고 덕을 쌓으며", line: "아름다운 성품과 도덕적 가치로 주변에 존경과 신뢰를 받는 삶", tags: ["인품이 훌륭한 사람", "배려심 깊은 사람", "신뢰를 주는 사람"] }
  ];

  for (const rule of rules) {
    if (rule.keys.some(k => meaningStr.includes(k))) {
      return rule;
    }
  }
  return base;
}

function buildFinalResult() {
  const rows = document.querySelectorAll('.char-select-row');
  let finalSimp = "";
  let finalTrad = "";
  let pinyins = [];
  let selectedDataArr = [];
  
  rows.forEach(row => {
    const activeBtn = row.querySelector('.hanja-btn.active');
    if(activeBtn) {
      finalSimp += activeBtn.getAttribute('data-simp');
      finalTrad += activeBtn.getAttribute('data-trad');
      pinyins.push(activeBtn.getAttribute('data-pinyin'));
      
      selectedDataArr.push({
        trad: activeBtn.getAttribute('data-trad'),
        simp: activeBtn.getAttribute('data-simp'),
        meaning: activeBtn.getAttribute('data-meaning')
      });
    }
  });
  
  document.getElementById('resSimplified').innerText = finalSimp;
  document.getElementById('resTraditional').innerText = `(한자 원문: ${finalTrad})`;
  
  const formattedPinyin = pinyins.map((p, i) => {
    if(!p) return "";
    let clean = p.trim();
    if(i === 0) {
      return clean.charAt(0).toUpperCase() + clean.slice(1);
    }
    return clean.toLowerCase();
  }).join(' ');
  
  document.getElementById('resPinyin').innerText = formattedPinyin;
  
  const interpContainer = document.getElementById('interpretationContainer');
  interpContainer.innerHTML = generateInterpretationHTML(selectedDataArr);
  
  document.getElementById('resultCard').classList.remove('hidden');
}

function generateInterpretationHTML(givenNameArr) {
  if (givenNameArr.length === 0) return "";
  
  let html = "";
  let isOneChar = givenNameArr.length === 1;
  
  // 1. 📖 한자 의미 섹션
  html += `<div class="r-section"><div class="r-title">📖 한자 의미</div><div class="r-text">`;
  givenNameArr.forEach(d => {
    let n = normalizeMeaning(d.meaning);
    let sem = getExtendedMeaning(n);
    html += `<strong>${d.trad}</strong><br>`;
    html += `기본 의미: ${d.meaning}을 뜻합니다.<br>`;
    html += `이름에서의 해석: ${sem.ext}<br><br>`;
  });
  html = html.slice(0, -4);
  html += `</div></div>`;
  
  // 2. ✨ 이름 풀이 섹션
  html += `<div class="r-section"><div class="r-title">✨ 이름 풀이</div><div class="r-text">`;
  let n1 = normalizeMeaning(givenNameArr[0].meaning);
  let sem1 = getExtendedMeaning(n1);
  let nameStr = givenNameArr.map(d=>d.trad).join('');
  
  if (isOneChar) {
    html += `"${nameStr}"(은)는 ${sem1.action} 나아가는 사람이라는 의미로 해석할 수 있습니다.`;
  } else {
    let n2 = normalizeMeaning(givenNameArr[1].meaning);
    let sem2 = getExtendedMeaning(n2);
    html += `"${nameStr}"(은)는 ${sem1.action} ${sem2.action} 주어진 위치에서 굳건히 자신의 궤적을 만들어가는 사람이라는 의미로 해석할 수 있습니다.`;
  }
  html += `</div></div>`;
  
  // 3. 💭 떠오르는 이미지 섹션
  html += `<div class="r-section"><div class="r-title">💭 떠오르는 이미지</div><div class="r-tags">`;
  const tags = [];
  givenNameArr.forEach(d => {
      let sem = getExtendedMeaning(normalizeMeaning(d.meaning));
      sem.tags.forEach(t => tags.push(t));
  });
  [...new Set(tags)].slice(0, 4).forEach(t => { html += `<span class="r-tag">${t}</span>`; });
  html += `</div></div>`;
  
  // 4. 🎯 한 줄 해석 섹션
  html += `<div class="r-section"><div class="r-title">🎯 한 줄 해석</div><div class="r-text">`;
  if (isOneChar) {
    html += `"${sem1.line}"`;
  } else {
    let n2 = normalizeMeaning(givenNameArr[1].meaning);
    let sem2 = getExtendedMeaning(n2);
    html += `"${sem1.line}, 그리고 ${sem2.line}"`;
  }
  html += `</div></div>`;
  
  // 5. 🎨 획순 쓰기 연습 섹션
  html += `<div class="r-section"><div class="r-title">🎨 간화자 획순 쓰기 연습</div><div>`;
  givenNameArr.forEach(d => {
    html += `
      <a class="btn-stroke-link" href="https://www.google.com/search?q=중국어+${encodeURIComponent(d.simp)}+획순" target="_blank">
        '${d.simp}' 획순 보기 ↗
      </a>&nbsp;
    `;
  });
  html += `</div></div>`;
  
  return html;
}

function playAudio() {
  const pinyinText = document.getElementById('resPinyin').innerText;
  if (!pinyinText) return;
  
  const utterance = new SpeechSynthesisUtterance(pinyinText);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.85; 
  window.speechSynthesis.speak(utterance);
}

function showLoading(msg) {
  document.getElementById('loadingText').innerText = msg;
  document.getElementById('loadingBox').classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loadingBox').classList.add('hidden');
}
</script>
